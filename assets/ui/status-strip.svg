<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="112" viewBox="0 0 1200 112" role="img" aria-labelledby="title desc">
  <title id="title">Mayank Shringi professional focus</title>
  <desc id="desc">A dark dashboard strip highlighting data engineering, analytics, AWS, SQL, and current learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#080d19"/>
      <stop offset=".55" stop-color="#0d1730"/>
      <stop offset="1" stop-color="#11102a"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="1198" height="110" rx="24" fill="url(#bg)" stroke="#253b69"/>
  <rect x="35" y="25" width="8" height="62" rx="4" fill="url(#stroke)" filter="url(#glow)"/>
  <g font-family="Segoe UI,Arial,sans-serif">
    <text x="68" y="43" fill="#7896ce" font-size="13" font-weight="700" letter-spacing="2">PRIMARY FOCUS</text>
    <text x="68" y="72" fill="#e6edf3" font-size="20" font-weight="700">Data Engineering + Analytics</text>
    <line x1="405" y1="24" x2="405" y2="88" stroke="#24365d"/>
    <text x="443" y="43" fill="#7896ce" font-size="13" font-weight="700" letter-spacing="2">CORE TOOLKIT</text>
    <text x="443" y="72" fill="#e6edf3" font-size="20" font-weight="700">Python · SQL · AWS · Power BI</text>
    <line x1="820" y1="24" x2="820" y2="88" stroke="#24365d"/>
    <text x="858" y="43" fill="#7896ce" font-size="13" font-weight="700" letter-spacing="2">NOW LEARNING</text>
    <text x="858" y="72" fill="#e6edf3" font-size="20" font-weight="700">Spark · Advanced SQL</text>
  </g>
</svg>
